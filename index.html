<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Elukkavex">
  <link rel="manifest" href="manifest.json">
  <title>Elukkavex — Luukku</title>
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #e0e0f0;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
    }

    header {
      width: 100%;
      max-width: 480px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0 20px;
    }

    header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    #conn-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #555;
      transition: background 0.4s;
      flex-shrink: 0;
    }
    #conn-dot.connected    { background: #4ade80; box-shadow: 0 0 8px #4ade80aa; }
    #conn-dot.disconnected { background: #f87171; }
    #conn-dot.connecting   { background: #facc15; animation: pulse 1s infinite; }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    .card {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 16px;
      padding: 20px;
      width: 100%;
      max-width: 480px;
      margin-bottom: 12px;
    }

    .card-title {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: #6b6b9a;
      margin-bottom: 14px;
    }

    /* State badge */
    #state-badge {
      font-size: 1.6rem;
      font-weight: 800;
      text-align: center;
      padding: 14px 0 6px;
      letter-spacing: 0.5px;
    }

    #state-sub {
      text-align: center;
      font-size: 0.82rem;
      color: #8888aa;
      margin-bottom: 4px;
    }

    /* Status rows */
    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 9px 0;
      border-bottom: 1px solid #22223a;
      font-size: 0.88rem;
    }
    .status-row:last-child { border-bottom: none; }
    .status-label { color: #8888aa; }
    .status-value { font-weight: 600; }

    /* Buttons */
    .btn-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .btn-grid.three { grid-template-columns: 1fr 1fr 1fr; }

    button {
      border: none;
      border-radius: 12px;
      padding: 16px 10px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
      letter-spacing: 0.3px;
    }
    button:active { transform: scale(0.96); }
    button:disabled { opacity: 0.35; cursor: not-allowed; }

    .btn-open  { background: #4ade80; color: #0a1a0a; }
    .btn-close { background: #60a5fa; color: #0a0f1a; }
    .btn-stop  { background: #f87171; color: #1a0a0a; }
    .btn-status { background: #2a2a4a; color: #c0c0e0; grid-column: span 2; }

    /* Log */
    #log {
      font-size: 0.78rem;
      font-family: 'SF Mono', 'Fira Code', monospace;
      color: #6060a0;
      max-height: 140px;
      overflow-y: auto;
      line-height: 1.6;
    }
    #log .entry { padding: 1px 0; }
    #log .entry.ok   { color: #4ade80; }
    #log .entry.warn { color: #facc15; }
    #log .entry.err  { color: #f87171; }

    #last-update {
      text-align: center;
      font-size: 0.72rem;
      color: #4a4a6a;
      padding: 8px 0 4px;
    }
  </style>
</head>
<body>

<header>
  <h1>🐾 Elukkavex</h1>
  <div style="display:flex;align-items:center;gap:8px">
    <span id="conn-label" style="font-size:0.78rem;color:#6b6b9a">Yhdistetään…</span>
    <div id="conn-dot" class="connecting"></div>
  </div>
</header>

<!-- State card -->
<div class="card">
  <div class="card-title">Tila</div>
  <div id="state-badge">—</div>
  <div id="state-sub">Ei yhteyttä</div>
</div>

<!-- Status details -->
<div class="card">
  <div class="card-title">Tiedot</div>
  <div class="status-row">
    <span class="status-label">Solenoidi</span>
    <span class="status-value" id="s-solenoid">—</span>
  </div>
  <div class="status-row">
    <span class="status-label">Magneetti</span>
    <span class="status-value" id="s-magnet">—</span>
  </div>
  <div class="status-row">
    <span class="status-label">Signaali</span>
    <span class="status-value" id="s-signal">—</span>
  </div>
  <div class="status-row">
    <span class="status-label">Käyntiika</span>
    <span class="status-value" id="s-uptime">—</span>
  </div>
  <div class="status-row">
    <span class="status-label">IP</span>
    <span class="status-value" id="s-ip">—</span>
  </div>
</div>

<!-- Controls -->
<div class="card">
  <div class="card-title">Ohjaus</div>
  <div class="btn-grid" style="margin-bottom:10px">
    <button class="btn-open"  onclick="sendCmd('open')"  id="btn-open">Avaa</button>
    <button class="btn-close" onclick="sendCmd('close')" id="btn-close">Sulje</button>
  </div>
  <div class="btn-grid three">
    <button class="btn-stop" onclick="sendCmd('stop')" id="btn-stop" style="grid-column:span 2">Hätä­pysäytys</button>
    <button class="btn-status" onclick="sendCmd('status')" id="btn-status" style="grid-column:span 1;font-size:0.8rem">Status</button>
  </div>
</div>

<!-- Log -->
<div class="card">
  <div class="card-title">Tapahtumat</div>
  <div id="log"></div>
</div>

<div id="last-update">Ei dataa</div>

<script>
  const BROKER  = 'wss://broker.hivemq.com:8884/mqtt';
  const TOPIC_STATUS = 'elukkavex/status';
  const TOPIC_ACK    = 'elukkavex/ack';
  const TOPIC_CMD    = 'elukkavex/cmd';

  const STATE_LABELS = {
    'CLOSED':   { text: 'Suljettu',   color: '#60a5fa' },
    'OPENING':  { text: 'Avataan…',   color: '#facc15' },
    'LOCKING':  { text: 'Lukitaan…',  color: '#facc15' },
    'RELEASING':{ text: 'Vapautetaan…',color:'#facc15' },
    'LOCKED':   { text: 'Auki + lukittu', color: '#4ade80' },
    'CLOSING':  { text: 'Suljetaan…', color: '#facc15' },
    'ERROR':    { text: 'Virhe',      color: '#f87171' },
  };

  const clientId = 'elukkavex-web-' + Math.random().toString(16).slice(2, 8);
  const client = mqtt.connect(BROKER, {
    clientId,
    keepalive: 30,
    reconnectPeriod: 4000,
    connectTimeout: 10000,
  });

  const dot   = document.getElementById('conn-dot');
  const label = document.getElementById('conn-label');

  function setConn(state) {
    dot.className = state;
    label.textContent = state === 'connected' ? 'Yhdistetty' :
                        state === 'connecting' ? 'Yhdistetään…' : 'Ei yhteyttä';
  }

  client.on('connect', () => {
    setConn('connected');
    client.subscribe([TOPIC_STATUS, TOPIC_ACK]);
    addLog('Yhdistetty brokeriin', 'ok');
  });
  client.on('offline',    () => { setConn('disconnected'); addLog('Yhteys katkennut', 'err'); });
  client.on('reconnect',  () => { setConn('connecting');   addLog('Yritetään uudelleen…', 'warn'); });
  client.on('error', (e)  => { addLog('Virhe: ' + e.message, 'err'); });

  client.on('message', (topic, payload) => {
    const msg = payload.toString();
    if (topic === TOPIC_STATUS) {
      try { applyStatus(JSON.parse(msg)); } catch(e) { addLog('JSON-virhe: ' + e.message, 'err'); }
    } else if (topic === TOPIC_ACK) {
      addLog('ACK: ' + msg, 'ok');
    }
  });

  function applyStatus(d) {
    const st = (d.state || '').toUpperCase();
    const info = STATE_LABELS[st] || { text: st || '?', color: '#e0e0f0' };
    document.getElementById('state-badge').textContent = info.text;
    document.getElementById('state-badge').style.color = info.color;
    document.getElementById('state-sub').textContent = 'Viimeksi: ' + new Date().toLocaleTimeString('fi-FI');

    setText('s-solenoid', d.solenoid ?? '—');
    setText('s-magnet',   d.magnet   != null ? (d.magnet ? 'Kiinni' : 'Auki') : '—');
    setText('s-signal',   d.signal   != null ? d.signal + ' dBm' : '—');
    setText('s-uptime',   d.uptime   != null ? fmtUptime(d.uptime) : '—');
    setText('s-ip',       d.ip       ?? '—');

    document.getElementById('last-update').textContent =
      'Päivitetty ' + new Date().toLocaleTimeString('fi-FI');
  }

  function setText(id, val) {
    document.getElementById(id).textContent = val;
  }

  function fmtUptime(ms) {
    const s = Math.floor(ms / 1000);
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    if (h > 0) return h + 'h ' + m + 'min';
    return m + 'min ' + (s % 60) + 's';
  }

  function sendCmd(cmd) {
    if (!client.connected) { addLog('Ei yhteyttä — komento hylätty', 'err'); return; }
    client.publish(TOPIC_CMD, cmd, { qos: 1 });
    addLog('→ ' + cmd, 'ok');
  }

  function addLog(text, cls) {
    const log = document.getElementById('log');
    const el = document.createElement('div');
    el.className = 'entry ' + (cls || '');
    const time = new Date().toLocaleTimeString('fi-FI', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
    el.textContent = time + '  ' + text;
    log.prepend(el);
    // Keep max 40 entries
    while (log.children.length > 40) log.removeChild(log.lastChild);
  }
</script>
</body>
</html>
