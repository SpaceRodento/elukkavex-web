services:
  - type: worker
    name: elukkavex-bot
    runtime: python
    buildCommand: pip install -r bot/requirements.txt
    startCommand: python bot/bot.py
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false
      - key: CHAT_IDS
        sync: false
      - key: MQTT_BROKER
        value: broker.hivemq.com
      - key: MQTT_PORT
        value: "1883"
